<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This page shows the beatiful scenary of Mombasa City">
    <meta name="author" content="Kevin Ogutu">
    <title>Mombasa, Kenya</title>
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>
<body>

    <header>
        <div>
            <h1>Welcome to Mombasa, Kenya</h1>
        </div>
    </header>

    <main class="overlay-container">
        <img class="image" src="images/mombasa.jpg" alt="Beautiful view of the City of Mombasa">
        
        <section class="overlay weather">
            <h2>Weather</h2>
            <p id="weather-description">Sunny</p>
            <p>Temperature: <span id="temperature"></span></p>
            <p>Wind Speed: <span id="wind-speed"></span></p>
            <p>Wind Chill: <span id="wind-chill"></span></p>
        </section>
         <section class="overlay info">
            <h2>Mombasa DATA</h2>
            <p>Population: 50002</p>
            <p>Capital: Nairobi</p>
            <p>Language: Kiswahili, English</p>
            <p>Currency: Shilling</p>
            <p>Time Zone: EAT</p>
            <p>Calling Code: +254</p>
        </section>
    </main>

    <footer>
        <p class="copyright">© 2024 🌹 Kevin Ogutu 🌹 Republic of Kenya</p>
        <span id="currentyear"></span>
    </footer>
    
</body>
</html>
